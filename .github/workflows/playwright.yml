# E2E は通常 CI（ci.yml）で実行。こちらは手動でのみ Playwright を回す用。
name: Playwright Tests (Manual Only)
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin: v6 (v6.0.2)
      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm
      - name: Build extension
        run: pnpm build
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # pin: v6 (v6.0.0)
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
