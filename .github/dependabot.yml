version: 2
updates:
  # To get started with Dependabot version updates, you'll need to specify which
  # package ecosystems to update and where the package manifests are located.
  # Please see the documentation for all configuration options:
  # https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
  #
  # ## グループ化について
  # - Dependabot に Renovate の「プリセット」相当の共有ライブラリはない。公式は groups で名前パターンを列挙する方式。
  # - 依存名が複数グループにマッチする場合は「先に定義したグループ」に入る（順序が重要）。
  # - マッチしない依存は従来どおり「1 依存 = 1 PR」。
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1000
    versioning-strategy: "increase"
    cooldown:
      default-days: 3
      include:
        - "*"
    groups:
      react-core:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tw-animate-css"
      radix:
        patterns:
          - "@radix-ui/*"
      biome:
        patterns:
          - "@biomejs/biome"
      wxt:
        patterns:
          - "wxt"
          - "@wxt-dev/*"
      playwright:
        patterns:
          - "@playwright/test"
      vitest:
        patterns:
          - "vitest"
      typescript:
        patterns:
          - "typescript"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1000
    cooldown:
      default-days: 3
      include:
        - "*"
    groups:
      github-actions-core:
        patterns:
          - "actions/*"
      github-actions-third-party:
        patterns:
          - "pnpm/action-setup"
          - "flatt-security/setup-takumi-guard-npm"
